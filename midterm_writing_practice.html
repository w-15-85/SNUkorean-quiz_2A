<body>
<h1>✍️ 서울대 한국어 2A 중간고사 쓰기 대비</h1>
<div id="main-menu" class="card"><h2>학습 메뉴</h2><p class="muted">2A 1과~9과 범위의 쓰기 시험 대비 연습입니다.</p><div class="menu-grid"><div class="card menu-card" onclick="startType1()"><h2>유형 1</h2><p><b>대화·읽기 빈칸 쓰기</b></p><p class="muted">각 과 4문항, 총 36문항. 각 문항에는 빈칸 2개가 있습니다.</p></div><div class="card menu-card" onclick="openType2Menu()"><h2>유형 2</h2><p><b>긴 글쓰기 연습</b></p><p class="muted">각 과 쓰기 주제 9개 중 하나를 골라 200~300자로 씁니다.</p></div></div></div>
<div id="type1-area" class="hidden"><div id="grammar-screen" class="card hidden"></div><div id="question-screen" class="card hidden"></div><div id="result-screen" class="card hidden"></div><div id="final-screen" class="card hidden"></div></div>
<div id="type2-area" class="hidden"><div id="type2-menu" class="card hidden"></div><div id="type2-write" class="card hidden"></div></div>
<script>
const unitData=[
{lesson:'1과',title:'처음 뵙겠습니다',grammar:['V-(으)려고 하다: 목적을 말합니다. 예) 한국어를 배우려고 해요.','N이에요/예요: 자기소개를 합니다. 예) 저는 학생이에요.'],questions:[{kind:'대화',text:'가: 왜 한국어를 배워요?<br>나: 한국 친구하고 이야기하려고 해요.<br>가: 한국 친구하고 무엇을 하려고 해요?<br>나: 한국 친구하고 ①[BLANK0].<br>가: 한국 회사에서 일하고 싶어요?<br>나: 네, 나중에 한국 회사에서 ②[BLANK1].',answers:[['이야기하려고 해요'],['일하려고 해요']]},{kind:'대화',text:'가: 이번 주말에 어디에 가요?<br>나: 시장에 가요.<br>가: 왜 시장에 가요?<br>나: 친구 선물을 ①[BLANK0].<br>가: 그 선물을 누구에게 줄 거예요?<br>나: 친구에게 ②[BLANK1].',answers:[['사려고 해요'],['주려고 해요']]},{kind:'읽기',text:'저는 마리아입니다. 한국어를 공부합니다. 한국 친구가 많습니다. 그래서 한국 친구하고 ①[BLANK0]. 한국 음식도 좋아합니다. 그래서 한국 음식을 ②[BLANK1].',answers:[['이야기하려고 해요'],['먹으려고 해요']]},{kind:'읽기',text:'내일 한국어 시험이 있습니다. 저는 오늘 도서관에 갑니다. 도서관에서 ①[BLANK0]. 시험이 끝나면 친구를 만납니다. 친구하고 저녁을 ②[BLANK1].',answers:[['공부하려고 해요'],['먹으려고 해요']]}]},
{lesson:'2과',title:'취미가 뭐예요?',grammar:['V-는 것: 동작을 명사처럼 말합니다. 예) 책을 읽는 것','V-(으)ㄹ 줄 알다/모르다: 배운 기술이나 방법을 말합니다. 예) 수영을 할 줄 알아요.','A/V-지 않다: 부정을 말합니다. 예) 어렵지 않아요.'],questions:[{kind:'대화',text:'가: 취미가 뭐예요?<br>나: 그림을 그리는 것을 좋아해요.<br>가: 무엇을 좋아해요?<br>나: 그림을 ①[BLANK0].<br>가: 매일 그림을 그려요?<br>나: 아니요, 매일 ②[BLANK1].',answers:[['그리는 것을 좋아해요','그림 그리는 것을 좋아해요'],['그리지 않아요']]},{kind:'대화',text:'가: 수영을 배웠어요?<br>나: 네, 작년에 배웠어요.<br>가: 그래서 수영을 잘해요?<br>나: 네, 수영을 ①[BLANK0].<br>가: 테니스도 배웠어요?<br>나: 아니요, 배운 적이 없어서 테니스를 ②[BLANK1].',answers:[['할 줄 알아요'],['칠 줄 몰라요']]},{kind:'읽기',text:'저는 요리를 좋아합니다. 주말에 김치찌개를 만듭니다. 저는 음식을 ①[BLANK0]. 하지만 매운 음식은 잘 못 먹습니다. 그래서 매운 음식은 ②[BLANK1].',answers:[['만드는 것을 좋아합니다','음식 만드는 것을 좋아합니다'],['좋아하지 않습니다']]},{kind:'읽기',text:'제 동생은 피아노를 배웠습니다. 그래서 피아노를 ①[BLANK0]. 저는 피아노를 배우지 않았습니다. 그래서 피아노를 ②[BLANK1].',answers:[['칠 줄 알아요'],['칠 줄 몰라요']]}]},
{lesson:'3과',title:'콘서트에 가 봤어요?',grammar:['V-아/어 보다: 경험을 말합니다. 예) 제주도에 가 봤어요.','N 동안: 기간을 말합니다. 예) 세 시간 동안 공부했어요.','A/V-는데, N인데: 뒤 내용을 자연스럽게 이어 줍니다.','V-(으)ㄹ N: 앞으로 할 일을 명사 앞에서 꾸밉니다. 예) 내일 볼 영화'],questions:[{kind:'대화',text:'가: 제주도에 가 봤어요?<br>나: 네, 작년에 제주도에 가 봤어요.<br>가: 작년에 어디에 가 봤어요?<br>나: 작년에 ①[BLANK0].<br>가: 제주도에서 며칠 있었어요?<br>나: 제주도에서 ②[BLANK1].',answers:[['제주도에 가 봤어요'],['삼 일 동안 있었어요','3일 동안 있었어요']]},{kind:'대화',text:'가: 이 표가 뭐예요?<br>나: 내일 볼 영화 표예요.<br>가: 내일 무엇을 볼 거예요?<br>나: 내일 ①[BLANK0].<br>가: 시간이 있어요?<br>나: 네, 시간이 ②[BLANK1].',answers:[['영화를 볼 거예요'],['있는데 같이 갈래요']]},{kind:'읽기',text:'저는 지난 주말에 콘서트에 갔습니다. 한국 가수의 콘서트였습니다. 저는 한국 가수 콘서트에 처음 ①[BLANK0]. 콘서트는 두 시간 동안 했습니다. 그래서 저는 콘서트를 ②[BLANK1].',answers:[['가 봤습니다'],['두 시간 동안 봤습니다']]},{kind:'읽기',text:'오늘은 친구 생일입니다. 저는 책을 샀습니다. 이 책은 친구에게 ①[BLANK0]. 저녁에 시간이 있는데 친구하고 ②[BLANK1].',answers:[['줄 선물입니다'],['밥을 먹으려고 해요','저녁을 먹으려고 해요']]}]},
{lesson:'4과',title:'옷이 좀 큰 것 같아요',grammar:['A-(으)ㄴ 것 같다, V-는 것 같다, N인 것 같다: 추측을 말합니다.','N보다: 비교를 말합니다.','A/V-았으면/었으면 좋겠다: 바람을 말합니다.'],questions:[{kind:'대화',text:'가: 이 옷이 어때요?<br>나: 좀 큰 것 같아요.<br>가: 이 옷이 커요?<br>나: 네, 좀 ①[BLANK0].<br>가: 어떤 옷이 있으면 좋겠어요?<br>나: 더 작은 옷이 ②[BLANK1].',answers:[['큰 것 같아요'],['있었으면 좋겠어요']]},{kind:'대화',text:'가: 파란색 셔츠와 흰색 셔츠 중에서 어느 것이 좋아요?<br>나: 파란색 셔츠가 더 좋아요.<br>가: 흰색 셔츠보다 무엇이 더 좋아요?<br>나: 흰색 셔츠보다 ①[BLANK0].<br>가: 가격은 어때요?<br>나: 가격도 ②[BLANK1].',answers:[['파란색 셔츠가 더 좋아요'],['싼 것 같아요']]},{kind:'읽기',text:'저는 어제 백화점에 갔습니다. 바지를 입어 봤습니다. 바지가 조금 길었습니다. 그래서 바지가 ①[BLANK0]. 저는 더 짧은 바지가 ②[BLANK1].',answers:[['긴 것 같았습니다'],['있었으면 좋겠습니다']]},{kind:'읽기',text:'친구 생일 선물을 사려고 합니다. 친구는 모자를 좋아합니다. 그래서 모자를 사면 ①[BLANK0]. 이 모자는 저 모자보다 색이 예쁩니다. 그래서 이 모자가 ②[BLANK1].',answers:[['좋을 것 같습니다'],['저 모자보다 예쁩니다']]}]},
{lesson:'5과',title:'어디에 가면 좋을까요?',grammar:['A/V-(으)ㄹ까요?: 의견을 묻습니다.','A/V-(으)ㄹ 거예요: 미래를 말합니다.','A/V-(으)니까, N(이)니까: 이유를 말합니다.','V-고 나서: 앞일이 끝난 뒤 다음 일을 말합니다.'],questions:[{kind:'대화',text:'가: 오늘 날씨가 좋아요.<br>나: 그러면 공원에 갈까요?<br>가: 날씨가 좋으니까 어디에 갈까요?<br>나: 날씨가 좋으니까 ①[BLANK0].<br>가: 숙제를 먼저 할 거예요?<br>나: 네, 숙제를 ②[BLANK1].',answers:[['공원에 갈까요'],['하고 나서 갈 거예요']]},{kind:'대화',text:'가: 배가 고파요. 어디에서 먹을까요?<br>나: 이 식당이 맛있으니까 여기에서 먹어요.<br>가: 왜 이 식당에서 먹어요?<br>나: 이 식당이 ①[BLANK0].<br>가: 식사 후에 뭐 할 거예요?<br>나: 밥을 먹고 나서 ②[BLANK1].',answers:[['맛있으니까 여기에서 먹어요'],['커피를 마실 거예요']]},{kind:'읽기',text:'이번 주말에 친구와 만납니다. 날씨가 좋을 것 같습니다. 그래서 우리는 한강 공원에 ①[BLANK0]. 공원에 가기 전에 점심을 먹습니다. 점심을 먹고 나서 ②[BLANK1].',answers:[['갈 거예요'],['공원에 갈 거예요']]},{kind:'읽기',text:'우리 동네에는 도서관이 있습니다. 도서관이 조용하니까 공부하기 좋습니다. 저는 시험이 있으니까 도서관에서 ①[BLANK0]. 공부하고 나서 집에 ②[BLANK1].',answers:[['공부할 거예요'],['갈 거예요']]}]},
{lesson:'6과',title:'비행기로 보내면 얼마예요?',grammar:['N(으)로: 방법이나 방향을 말합니다. 예) 비행기로 보내요.','N(이)라서: 이유를 말합니다.','르 불규칙: 빠르다 → 빨라요.','V-(으)면 되다: 방법을 말합니다. 예) 이름을 쓰면 돼요.','V-(으)ㄴ 것 같다: 추측을 말합니다.'],questions:[{kind:'대화',text:'가: 이 편지를 어떻게 보낼까요?<br>나: 비행기로 보내세요.<br>가: 무엇으로 보내요?<br>나: ①[BLANK0].<br>가: 주소를 어디에 쓰면 돼요?<br>나: 여기에 주소를 ②[BLANK1].',answers:[['비행기로 보내세요'],['쓰면 돼요']]},{kind:'대화',text:'가: 이 소포는 책이에요. 좀 무거워요.<br>나: 책이라서 무거운 것 같아요.<br>가: 왜 무거워요?<br>나: ①[BLANK0].<br>가: 상자에 넣으면 돼요?<br>나: 네, 상자에 ②[BLANK1].',answers:[['책이라서 무거운 것 같아요'],['넣으면 돼요']]},{kind:'읽기',text:'저는 가족에게 선물을 보냅니다. 빨리 보내고 싶습니다. 그래서 선물을 비행기로 ①[BLANK0]. 우체국 직원이 이름과 주소를 쓰면 된다고 했습니다. 그래서 이름과 주소를 ②[BLANK1].',answers:[['보냅니다'],['쓰면 됩니다']]},{kind:'읽기',text:'이 편지는 중요한 편지입니다. 그래서 빠른 우편으로 보냅니다. 빠른 우편은 보통 우편보다 ①[BLANK0]. 편지가 작아서 봉투에 ②[BLANK1].',answers:[['빨라요'],['넣으면 돼요']]}]},

{lesson:'8과',title:'정말 속상하겠어요',grammar:['A/V-겠-: 추측이나 공감을 말합니다. 예) 힘들겠어요.','N 때문에: 이유를 말합니다.','V-아/어 버리다: 끝난 일과 아쉬움을 말합니다.','A/V-(으)ㄹ 때: 시간을 말합니다.'],questions:[{kind:'대화',text:'가: 왜 속상해요?<br>나: 지갑을 잃어버렸어요.<br>가: 지갑을 잃어버렸어요? 정말 ①[BLANK0].<br>나: 네, 지갑 ②[BLANK1].',answers:[['속상하겠어요'],['때문에 속상해요']]},{kind:'대화',text:'가: 어제 왜 학교에 못 왔어요?<br>나: 감기 때문에 못 왔어요.<br>가: 왜 못 왔어요?<br>나: ①[BLANK0].<br>가: 아팠을 때 무엇을 했어요?<br>나: 아팠을 때 집에서 ②[BLANK1].',answers:[['감기 때문에 못 왔어요'],['쉬었어요']]},{kind:'읽기',text:'오늘 아침에 버스를 놓쳤습니다. 그래서 학교에 늦었습니다. 버스를 놓쳐 버려서 정말 ①[BLANK0]. 다음부터 학교에 갈 때 일찍 ②[BLANK1].',answers:[['속상했습니다'],['나갈 거예요']]},{kind:'읽기',text:'저는 어제 휴대전화를 잃어버렸습니다. 휴대전화 때문에 친구에게 연락하지 못했습니다. 친구에게 연락하지 못해서 ①[BLANK0]. 물건을 잃어버렸을 때는 빨리 ②[BLANK1].',answers:[['미안했습니다'],['찾아야 합니다']]}]},

const writingTopics=[{lesson:'1과',title:'자기소개와 한국어 공부',prompt:'자기소개를 하고 한국어를 왜 배우는지 쓰세요. 이름, 나라, 직업, 한국어를 배우는 이유를 포함하세요.',sample:'저는 마리아입니다. 베트남에서 왔습니다. 지금 대학교에서 공부합니다. 저는 한국 친구하고 이야기하려고 한국어를 배웁니다. 한국 음식도 좋아합니다. 앞으로 한국어를 더 열심히 공부하고 싶습니다.'},{lesson:'2과',title:'나의 취미',prompt:'자신의 취미를 소개하세요. 좋아하는 활동, 할 줄 아는 것, 자주 하는 일을 쓰세요.',sample:'제 취미는 책을 읽는 것입니다. 저는 주말에 도서관에 갑니다. 조용한 곳에서 책을 읽는 것을 좋아합니다. 수영도 할 줄 압니다. 하지만 테니스는 배운 적이 없어서 칠 줄 모릅니다.'},{lesson:'3과',title:'기억에 남는 경험',prompt:'가 본 곳이나 해 본 일을 소개하세요. 언제, 어디에서, 얼마나 했는지 쓰세요.',sample:'저는 지난달에 친구와 콘서트에 가 봤습니다. 콘서트는 두 시간 동안 했습니다. 사람이 많았지만 정말 재미있었습니다. 다음에는 가족과 함께 다른 공연도 보러 가고 싶습니다.'},{lesson:'4과',title:'사고 싶은 옷',prompt:'사고 싶은 옷을 설명하세요. 색, 크기, 가격, 바람을 포함하세요.',sample:'저는 새 셔츠를 사고 싶습니다. 파란색 셔츠가 흰색 셔츠보다 더 예쁜 것 같습니다. 하지만 가격이 조금 비쌉니다. 조금 더 쌌으면 좋겠습니다. 주말에 친구와 백화점에 갈 것입니다.'},{lesson:'5과',title:'추천하고 싶은 장소',prompt:'친구에게 좋은 장소를 추천하세요. 이유와 계획을 쓰세요.',sample:'저는 친구에게 한강 공원을 추천하고 싶습니다. 한강 공원은 넓고 조용하니까 쉬기 좋습니다. 날씨가 좋으면 자전거를 탈 수 있습니다. 점심을 먹고 나서 공원에 가면 좋을 것 같습니다.'},{lesson:'6과',title:'우체국 이용하기',prompt:'우체국에서 물건을 보내는 상황을 쓰세요. 무엇을 보내는지, 어떻게 보내는지 쓰세요.',sample:'저는 가족에게 선물을 보내려고 우체국에 갔습니다. 선물이 조금 급해서 비행기로 보냈습니다. 직원이 이름과 주소를 쓰면 된다고 했습니다. 저는 상자에 선물을 넣고 주소를 썼습니다.'},{lesson:'7과',title:'길 찾기와 장소 소개',prompt:'어떤 장소에 가는 방법을 설명하세요. 위치와 가는 방법을 쓰세요.',sample:'우리 학교 옆에는 도서관이 있습니다. 도서관에 가려면 학교 정문에서 곧장 가면 됩니다. 은행 앞에서 오른쪽으로 가세요. 길을 모르면 안내소에 물어보면 됩니다.'},{lesson:'8과',title:'속상했던 일',prompt:'속상했던 경험을 쓰세요. 무슨 일이 있었는지, 왜 속상했는지, 그때 무엇을 했는지 쓰세요.',sample:'저는 어제 지갑을 잃어버렸습니다. 지갑 때문에 친구에게 밥을 사 주지 못했습니다. 정말 속상했습니다. 집에 갈 때 길에서 다시 찾아봤지만 없었습니다. 다음부터 물건을 잘 볼 것입니다.'},{lesson:'9과',title:'문의하고 싶은 일',prompt:'전화나 메시지로 문의하는 상황을 쓰세요. 무엇을 알고 싶은지, 어떤 부탁을 하는지 쓰세요.',sample:'저는 한국어 수업을 신청하고 싶어서 문화센터에 전화했습니다. 직원에게 수업 시간이 언제인지 물어봤습니다. 직원은 내일 다시 전화해 주겠다고 했습니다. 저는 이름과 전화번호를 남겼습니다.'}];
let currentUnit=0,unitScores=Array(unitData.length).fill(null),lastResults=[],currentTopic=null,writeAttempt=0;
function hideAll(){document.getElementById('main-menu').classList.add('hidden');document.getElementById('type1-area').classList.add('hidden');document.getElementById('type2-area').classList.add('hidden');['grammar-screen','question-screen','result-screen','final-screen','type2-menu','type2-write'].forEach(id=>document.getElementById(id).classList.add('hidden'))}function showMain(){hideAll();document.getElementById('main-menu').classList.remove('hidden');scrollTo(0,0)}function startType1(){hideAll();document.getElementById('type1-area').classList.remove('hidden');currentUnit=0;unitScores=Array(unitData.length).fill(null);showGrammar()}function showGrammar(){hideAll();document.getElementById('type1-area').classList.remove('hidden');const u=unitData[currentUnit],el=document.getElementById('grammar-screen');el.classList.remove('hidden');el.innerHTML=`<div class="stage-title">${u.lesson} ${u.title} - 목표 문법 확인</div><div class="grammar-box"><ul>${u.grammar.map(g=>`<li>${g}</li>`).join('')}</ul></div><div class="warn">이 단원 문제는 총 4문항, 빈칸 8개입니다. <b>8개 중 6개 이상</b> 맞아야 다음 단원으로 넘어갈 수 있습니다. 쓰기 시험 대비이므로 띄어쓰기도 정확히 써야 합니다.</div><div class="btn-row"><button class="gray" onclick="backFromGrammar()">← 뒤로 가기</button><button class="green" onclick="showQuestions()">문제 시작하기 →</button></div>`;scrollTo(0,0)}function backFromGrammar(){if(currentUnit===0)showMain();else{currentUnit--;showQuestions(false)}}function renderPassage(q,qi){let html=q.text;q.answers.forEach((ans,bi)=>{html=html.replace(`[BLANK${bi}]`,`<input class="blank-input" id="u${currentUnit}-q${qi}-b${bi}" autocomplete="off" placeholder="${bi+1}번 빈칸">`)});return html}function showQuestions(scrollTop=true){hideAll();document.getElementById('type1-area').classList.remove('hidden');const u=unitData[currentUnit],el=document.getElementById('question-screen');el.classList.remove('hidden');let html=`<div class="stage-title">${u.lesson} ${u.title} - 유형 1 문제</div><p class="muted">1~2번은 대화 지문, 3~4번은 읽기 지문입니다. 앞뒤 단서를 보고 빈칸에 알맞은 말을 쓰세요.</p>`;u.questions.forEach((q,i)=>html+=`<div class="problem"><div class="problem-head">${i+1}. ${q.kind} 지문 - 빈칸에 맞는 말을 쓰세요.</div><div class="passage">${renderPassage(q,i)}</div></div>`);html+=`<div id="missing-msg" class="warn hidden">모든 빈칸에 답을 쓰세요.</div><div class="btn-row"><button class="gray" onclick="showGrammar()">← 뒤로 가기</button><button class="blue" onclick="submitUnit()">↵ 제출하기</button></div>`;el.innerHTML=html;if(scrollTop)scrollTo(0,0)}function normalizeStrict(s){return(s||'').trim().normalize('NFC')}function submitUnit(){const u=unitData[currentUnit],inputs=[...document.querySelectorAll('.blank-input')];if(inputs.some(inp=>normalizeStrict(inp.value)==='')){document.getElementById('missing-msg').classList.remove('hidden');return}let correct=0;lastResults=[];u.questions.forEach((q,qi)=>q.answers.forEach((ansList,bi)=>{const val=normalizeStrict(document.getElementById(`u${currentUnit}-q${qi}-b${bi}`).value),ok=ansList.map(normalizeStrict).includes(val);if(ok)correct++;lastResults.push({q:qi+1,b:bi+1,user:val,ok,answers:ansList})}));unitScores[currentUnit]={correct,total:8,pass:correct>=6};showUnitResult()}function showUnitResult(){hideAll();document.getElementById('type1-area').classList.remove('hidden');const u=unitData[currentUnit],r=unitScores[currentUnit],el=document.getElementById('result-screen');el.classList.remove('hidden');let html=`<div class="stage-title">${u.lesson} 채점 결과</div><div class="score-big">${r.correct} / ${r.total}개 정답 (${Math.round(r.correct/r.total*100)}점)</div>`;html+=lastResults.map(x=>`<div class="result-line ${x.ok?'ok':'bad'}">${x.q}번-${x.b}칸: ${x.ok?'✓ 정답':'✗ 오답'} / 입력: <b>${escapeHtml(x.user)}</b>${x.ok?'':` / 정답: <b>${escapeHtml(x.answers[0])}</b>`}</div>`).join('');html+=r.pass?`<div class="warn">통과했습니다. 다음 단원으로 이동할 수 있습니다.</div><div class="btn-row"><button class="gray" onclick="showQuestions()">← 문제로 돌아가기</button>${currentUnit<unitData.length-1?`<button class="green" onclick="nextUnit()">다음 단원으로 →</button>`:`<button class="green" onclick="showFinalReport()">결과 보기 📊</button>`}</div>`:`<div class="warn">70점 미만입니다. 이 단원을 다시 풀어야 합니다. 8개 중 6개 이상 맞아야 합니다.</div><div class="btn-row"><button class="gray" onclick="showQuestions()">← 문제로 돌아가기</button><button class="orange" onclick="showQuestions()">↻ 다시 풀기</button></div>`;el.innerHTML=html;scrollTo(0,0)}function nextUnit(){currentUnit++;showGrammar()}function showFinalReport(){hideAll();document.getElementById('type1-area').classList.remove('hidden');const el=document.getElementById('final-screen');el.classList.remove('hidden');let totalC=0,totalT=0,rows=unitData.map((u,i)=>{const s=unitScores[i]||{correct:0,total:8,pass:false};totalC+=s.correct;totalT+=s.total;return`<tr><td>${u.lesson}</td><td>${u.title}</td><td>${s.correct} / ${s.total}</td><td>${Math.round(s.correct/s.total*100)}점</td><td>${s.pass?'통과':'미통과'}</td></tr>`}).join('');el.innerHTML=`<div class="stage-title">📊 유형 1 최종 결과</div><table class="report-table"><thead><tr><th>단원</th><th>제목</th><th>점수</th><th>백분율</th><th>결과</th></tr></thead><tbody>${rows}</tbody></table><div class="score-big">전체 점수: ${totalC} / ${totalT}개 정답 (${Math.round(totalC/totalT*100)}점)</div><div class="btn-row"><button class="gray" onclick="showMain()">🏠 메뉴로 가기</button></div>`;scrollTo(0,0)}function escapeHtml(str){return String(str).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function openType2Menu(){hideAll();document.getElementById('type2-area').classList.remove('hidden');const el=document.getElementById('type2-menu');el.classList.remove('hidden');el.innerHTML=`<div class="stage-title">유형 2 - 긴 글쓰기 주제 선택</div><p class="muted">주제를 선택하고 200~300자 글을 쓰세요. 글자 수는 띄어쓰기 포함입니다.</p><div class="topic-list">${writingTopics.map((t,i)=>`<div class="topic-card" onclick="selectTopic(${i})"><span class="tag">${t.lesson}</span><b>${t.title}</b><p class="small">${t.prompt}</p></div>`).join('')}</div><div class="btn-row"><button class="gray" onclick="showMain()">← 뒤로 가기</button></div>`;scrollTo(0,0)}function selectTopic(i){currentTopic=writingTopics[i];writeAttempt=0;showWritingScreen('')}function showWritingScreen(text){hideAll();document.getElementById('type2-area').classList.remove('hidden');const el=document.getElementById('type2-write');el.classList.remove('hidden');el.innerHTML=`<div class="stage-title">${currentTopic.lesson} ${currentTopic.title}</div><div class="grammar-box"><b>쓰기 주제</b><br>${currentTopic.prompt}</div><textarea id="essay" oninput="updateCount()" placeholder="여기에 200~300자로 쓰세요.">${escapeHtml(text)}</textarea><div id="char-count" class="count-box">0자</div><div id="writing-feedback"></div><div class="btn-row"><button class="gray" onclick="openType2Menu()">← 뒤로 가기</button><button class="orange" onclick="copyAndOpenSpell()">맞춤법 검사기 열기 ↗</button><button class="blue" onclick="checkWriting()">↵ 제출하기</button></div>`;updateCount();scrollTo(0,0)}function updateCount(){const t=document.getElementById('essay');if(t)document.getElementById('char-count').innerText=`${t.value.length}자`}const typoRules=[{bad:'안되요',good:'안 돼요',msg:'‘안되요’는 ‘안 돼요’로 씁니다.'},{bad:'됬',good:'됐',msg:'‘됬’이 아니라 ‘됐’을 씁니다.'},{bad:'할려고',good:'하려고',msg:'‘할려고’보다 ‘하려고’가 맞습니다.'},{bad:'갈려고',good:'가려고',msg:'‘갈려고’보다 ‘가려고’가 맞습니다.'},{bad:'먹을려고',good:'먹으려고',msg:'‘먹을려고’보다 ‘먹으려고’가 맞습니다.'},{bad:'이예요',good:'이에요/예요',msg:'받침 뒤에는 보통 ‘이에요’를 씁니다.'},{bad:'거에요',good:'거예요',msg:'‘거에요’보다 ‘거예요’가 맞습니다.'},{bad:'어떻해',good:'어떻게 해',msg:'‘어떻해’는 ‘어떻게 해’로 고쳐 씁니다.'}];function checkWriting(){const essay=document.getElementById('essay').value;writeAttempt++;let issues=[];if(essay.trim()==='')issues.push('글을 먼저 작성하세요.');if(essay.length<200||essay.length>300)issues.push(`분량을 확인하세요. 현재 ${essay.length}자입니다. 200~300자로 써야 합니다.`);typoRules.forEach(r=>{if(essay.includes(r.bad))issues.push(r.msg)});const trimmed=essay.trim();if(trimmed&&!/[.!?。？！요다니다습니다]$/.test(trimmed))issues.push('마지막 문장 끝을 확인하세요. 문장 끝에 알맞은 종결 표현이나 문장 부호를 쓰세요.');if((essay.match(/,/g)||[]).length>8)issues.push('쉼표가 너무 많습니다. 문장을 짧게 나누어 보세요.');renderWritingFeedback(essay,issues)}function renderWritingFeedback(essay,issues){const fb=document.getElementById('writing-feedback');let marked=escapeHtml(essay);typoRules.forEach(r=>{marked=marked.split(escapeHtml(r.bad)).join(`<span class="mark">${escapeHtml(r.bad)}</span>`)});if(issues.length===0){fb.innerHTML=`<div class="result-line ok">✓ 형식 점검을 통과했습니다. 실제 시험 전에는 선생님의 최종 확인을 받으세요.</div><div class="marked-preview">${marked}</div>`;return}let html=`<div class="warn"><b>수정이 필요합니다. (${writeAttempt}회 제출)</b><ul>${issues.map(i=>`<li>${i}</li>`).join('')}</ul></div><div class="marked-preview">${marked}</div>`;if(writeAttempt>=2)html+=`<div class="grammar-box"><b>참고 답안</b><br>${currentTopic.sample}</div>`;else html+=`<div class="muted">내용을 고친 뒤 다시 ↵ 제출하기를 누르세요. 2회 제출 후에도 문제가 있으면 참고 답안이 보입니다.</div>`;fb.innerHTML=html}async function copyAndOpenSpell(){const text=document.getElementById('essay')?.value||'';try{await navigator.clipboard.writeText(text);alert('글을 복사했습니다. 새 창에서 맞춤법 검사기에 붙여넣으세요.')}catch(e){alert('글을 직접 복사한 뒤 맞춤법 검사기에 붙여넣으세요.')}window.open('https://search.naver.com/search.naver?query=%EB%84%A4%EC%9D%B4%EB%B2%84%20%EB%A7%9E%EC%B6%A4%EB%B2%95%20%EA%B2%80%EC%82%AC%EA%B8%B0','_blank')}
</script>
