<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서울대 한국어 2A - 중간고사 쓰기 연습</title>
  <style>
    :root {
      --main:#27ae60;
      --dark:#2c3e50;
      --blue:#3498db;
      --orange:#e67e22;
      --red:#e74c3c;
      --gray:#95a5a6;
      --bg:#f4f7f6;
      --soft:#f7fbf9;
    }

    body {
      font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
      margin:0;
      padding:20px;
      background:var(--bg);
      color:#243443;
      line-height:1.75;
    }

    .wrap {
      max-width:1050px;
      margin:0 auto;
    }

    h1 {
      text-align:center;
      color:var(--dark);
      border-bottom:4px solid var(--main);
      padding-bottom:14px;
    }

    .card {
      background:#fff;
      border-radius:16px;
      padding:28px;
      box-shadow:0 4px 18px rgba(0,0,0,.08);
      margin:20px 0;
    }

    .menu-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .menu-card {
      background:#fff;
      border:3px solid transparent;
      padding:28px;
      border-radius:16px;
      cursor:pointer;
      text-align:center;
      box-shadow:0 3px 12px rgba(0,0,0,.06);
      transition:.2s;
    }

    .menu-card:hover {
      border-color:var(--main);
      transform:translateY(-2px);
    }

    .menu-card h2 {
      color:var(--main);
      margin-top:0;
    }

    .topic-grid {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:14px;
      margin-top:20px;
    }

    .topic-card {
      border:2px solid #dfe6e9;
      border-radius:12px;
      padding:18px;
      cursor:pointer;
      background:#fbfdfc;
      transition:.2s;
    }

    .topic-card:hover {
      border-color:var(--main);
      background:#effff6;
    }

    .topic-card strong {
      color:var(--dark);
      display:block;
      margin-bottom:6px;
    }

    .btn {
      border:0;
      border-radius:9px;
      padding:12px 22px;
      color:#fff;
      font-weight:700;
      font-size:1rem;
      cursor:pointer;
      margin:6px;
    }

    .btn-main { background:var(--main); }
    .btn-blue { background:var(--blue); }
    .btn-orange { background:var(--orange); }
    .btn-gray { background:var(--gray); }

    .stage-title {
      background:var(--dark);
      color:#fff;
      padding:14px;
      border-radius:10px;
      text-align:center;
      font-weight:800;
      font-size:1.25rem;
      margin-bottom:18px;
    }

    .grammar-box {
      background:#ecfff5;
      border-left:6px solid var(--main);
      padding:16px 20px;
      border-radius:0 12px 12px 0;
      margin-bottom:22px;
    }

    .grammar-box ul {
      margin:8px 0 0 22px;
    }

    .q-block {
      border-left:6px solid var(--main);
      background:#fbfdfc;
      padding:20px 24px;
      margin:22px 0;
      border-radius:0 12px 12px 0;
    }

    .q-title {
      font-weight:800;
      color:var(--main);
      font-size:1.15rem;
      margin-bottom:12px;
    }

    .q-text {
      font-size:1.08rem;
    }

    .dialog-line {
      margin:7px 0;
    }

    .reading-text {
      background:#fff;
      padding:14px 16px;
      border-radius:10px;
      border:1px solid #eef2f1;
    }

    .answer-select {
      border:2px solid #cfd8dc;
      border-radius:8px;
      padding:8px 14px;
      font-size:1rem;
      min-width:210px;
      margin:3px 6px;
      font-weight:700;
      color:#1f618d;
      background:white;
    }

    .answer-select.correct {
      border-color:var(--main);
      background:#f0fff6;
    }

    .answer-select.wrong {
      border-color:var(--red);
      background:#fff5f5;
    }

    .feedback {
      margin-top:12px;
      padding:12px;
      border-radius:8px;
      display:none;
    }

    .feedback.ok {
      background:#ecfff5;
      color:#167a3a;
    }

    .feedback.no {
      background:#fff1f0;
      color:#b03a2e;
    }

    .result-table {
      width:100%;
      border-collapse:collapse;
      margin:20px 0;
    }

    .result-table th,
    .result-table td {
      border:1px solid #ddd;
      padding:12px;
      text-align:center;
    }

    .result-table th {
      background:var(--dark);
      color:#fff;
    }

    .hidden {
      display:none;
    }

    textarea {
      width:100%;
      min-height:260px;
      border:2px solid #cfd8dc;
      border-radius:12px;
      padding:15px;
      font-size:1rem;
      line-height:1.7;
      box-sizing:border-box;
    }

    .notice {
      color:#607d8b;
      font-size:.95rem;
    }

    .error-list li {
      margin:5px 0;
    }

    @media(max-width:760px) {
      .menu-grid,
      .topic-grid {
        grid-template-columns:1fr;
      }

      .answer-select {
        width:95%;
        min-width:0;
      }
    }
  </style>
</head>

        text:"태권도 체험 프로그램 안내입니다. 참가비는 무료인데요. 재료비는 만 원입니다. 신청은 전화로 하면 됩니다. 참가비는 [[0]]. 신청은 전화로 [[1]].",
        answers:[
          {a:"무료인데요", o:["무료인데요","무료 중입니다","무료밖에입니다"]},
          {a:"하면 됩니다", o:["하면 됩니다","하나요","하는 중입니다"]}
        ]
      }
    ]
  }
];

const writingTopics = [
  { lesson:"1과", title:"자기소개와 한국어 공부", prompt:"이름, 국적, 직업, 한국어를 배우는 이유를 쓰세요." },
  { lesson:"2과", title:"나의 취미", prompt:"자신의 취미, 좋아하는 활동, 할 줄 아는 것을 쓰세요." },
  { lesson:"3과", title:"기억에 남는 경험", prompt:"가 본 곳이나 해 본 활동을 기간 표현과 함께 쓰세요." },
  { lesson:"4과", title:"사고 싶은 옷", prompt:"사고 싶은 옷의 색깔, 사이즈, 가격, 바라는 점을 쓰세요." },
  { lesson:"5과", title:"추천하고 싶은 여행지", prompt:"추천하고 싶은 장소와 이유, 여행 계획을 쓰세요." },
  { lesson:"6과", title:"우체국이나 은행 이용", prompt:"편지, 소포, 환전, 송금 경험이나 방법을 쓰세요." },
  { lesson:"7과", title:"길 안내하기", prompt:"학교나 집 근처 장소에 가는 길을 설명하세요." },
  { lesson:"8과", title:"속상했던 일", prompt:"속상했던 일, 이유, 그때의 기분을 쓰세요." },
  { lesson:"9과", title:"문의하고 싶은 프로그램", prompt:"참가하고 싶은 프로그램에 대해 문의할 내용을 쓰세요." }
];

let currentLesson = 0;
let lessonScores = [];
let type2Try = 0;
let selectedTopicIndex = null;

function hideAll() {
  document.getElementById('mainMenu').classList.add('hidden');
  document.getElementById('type1Area').classList.add('hidden');
  document.getElementById('type2Area').classList.add('hidden');
}

function goMain() {
  hideAll();
  document.getElementById('mainMenu').classList.remove('hidden');
  window.scrollTo(0,0);
}

function startType1() {
  hideAll();
  currentLesson = 0;
  lessonScores = [];
  renderLessonIntro();
}

function renderLessonIntro() {
  const area = document.getElementById('type1Area');
  area.classList.remove('hidden');
  const lesson = lessons[currentLesson];

  area.innerHTML = `
    <div class="card">
      <div class="stage-title">${lesson.lesson} ${lesson.title}</div>
      <div class="grammar-box">
        <strong>이번 단원에서 참고할 문법</strong>
        <ul>${lesson.grammar.map(g => `<li>${g}</li>`).join('')}</ul>
      </div>
      <p>
        이 단원은 총 8문제입니다. 1~4번은 대화 지문, 5~8번은 읽기 지문입니다.
        각 문제에는 빈칸이 2개씩 있습니다. 총 16개 빈칸 중 12개 이상 맞아야 다음 단원으로 갈 수 있습니다.
      </p>
      <div style="text-align:center;">
        <button class="btn btn-gray" onclick="${currentLesson === 0 ? 'goMain()' : 'goPrevLesson()'}">← 뒤로 가기</button>
        <button class="btn btn-main" onclick="renderLessonQuiz()">문제 시작하기 →</button>
      </div>
    </div>
  `;
  window.scrollTo(0,0);
}

function goPrevLesson() {
  currentLesson = Math.max(0, currentLesson - 1);
  renderLessonIntro();
}

function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function renderSelect(qIndex, blankIndex, answerObj) {
  const options = shuffleArray(answerObj.o);
  return `
    <select class="answer-select" id="q-${qIndex}-${blankIndex}">
      <option value="">선택</option>
      ${options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
    </select>
  `;
}

function renderTextWithSelects(text, qIndex, q) {
  return text.replace(/\[\[(\d)\]\]/g, (_, n) => {
    const blankIndex = Number(n);
    return renderSelect(qIndex, blankIndex, q.answers[blankIndex]);
  });
}

function renderLessonQuiz() {
  const area = document.getElementById('type1Area');
  const lesson = lessons[currentLesson];

  let html = `
    <div class="card">
      <div class="stage-title">${lesson.lesson} ${lesson.title} - 유형 1 빈칸 선택</div>
      <div class="grammar-box">
        <strong>참고 문법</strong>
        <ul>${lesson.grammar.map(g => `<li>${g}</li>`).join('')}</ul>
      </div>
  `;

  lesson.questions.forEach((q, qi) => {
    html += `
      <div class="q-block">
        <div class="q-title">${qi + 1}. ${q.kind} 지문 - 빈칸에 맞는 말을 고르세요.</div>
        <div class="${q.kind === '읽기' ? 'reading-text' : 'q-text'}">
          ${renderTextWithSelects(q.text, qi, q)}
        </div>
        <div id="fb-q-${qi}" class="feedback"></div>
      </div>
    `;
  });

  html += `
      <div style="text-align:center;">
        <button class="btn btn-gray" onclick="renderLessonIntro()">← 뒤로 가기</button>
        <button class="btn btn-blue" onclick="submitLesson()">↵ 제출하기</button>
      </div>
    </div>
  `;

  area.innerHTML = html;
  window.scrollTo(0,0);
}

function submitLesson() {
  const lesson = lessons[currentLesson];
  let total = 0;
  let correct = 0;
  let empty = false;

  lesson.questions.forEach((q, qi) => {
    q.answers.forEach((ans, ai) => {
      total++;
      const select = document.getElementById(`q-${qi}-${ai}`);
      if (!select.value) empty = true;
    });
  });

  if (empty) {
    alert('모든 빈칸의 답을 선택하세요.');
    return;
  }

  lesson.questions.forEach((q, qi) => {
    const wrongList = [];

    q.answers.forEach((ans, ai) => {
      const select = document.getElementById(`q-${qi}-${ai}`);
      const value = select.value;

      if (value === ans.a) {
        correct++;
        select.classList.add('correct');
      } else {
        select.classList.add('wrong');
        wrongList.push(`${ai === 0 ? '①' : '②'} 정답: ${ans.a}`);
      }

      select.disabled = true;
    });

    const fb = document.getElementById(`fb-q-${qi}`);
    fb.innerHTML = wrongList.length ? '오답 확인:<br>' + wrongList.join('<br>') : '모두 정답입니다.';
    fb.className = 'feedback ' + (wrongList.length ? 'no' : 'ok');
    fb.style.display = 'block';
  });

  const passScore = Math.ceil(total * 0.7);
  const pass = correct >= passScore;

  lessonScores[currentLesson] = {
    lesson: lesson.lesson,
    title: lesson.title,
    correct,
    total,
    pass
  };

  const resultBox = document.createElement('div');
  resultBox.className = 'card';
  resultBox.innerHTML = `
    <div class="stage-title" style="background:${pass ? '#27ae60' : '#e74c3c'};">
      ${pass ? '통과' : '다시 풀기 필요'}: ${correct} / ${total}
    </div>
    <p style="text-align:center;font-weight:bold;">통과 기준: ${passScore}문항 이상 정답</p>
    <div style="text-align:center;">
      ${
        pass
        ? (
          currentLesson < lessons.length - 1
          ? '<button class="btn btn-main" onclick="nextLesson()">다음 단원으로 →</button>'
          : '<button class="btn btn-main" onclick="showType1Report()">결과 보기 📊</button>'
        )
        : '<button class="btn btn-orange" onclick="renderLessonQuiz()">↻ 다시 풀기</button>'
      }
      <button class="btn btn-gray" onclick="goMain()">🏠 메뉴로 가기</button>
    </div>
  `;

  document.getElementById('type1Area').appendChild(resultBox);
  resultBox.scrollIntoView({ behavior:'smooth' });
}

function nextLesson() {
  currentLesson++;
  renderLessonIntro();
}

function showType1Report() {
  let rows = '';
  let totalCorrect = 0;
  let totalQuestions = 0;

  lessons.forEach((lesson, i) => {
    const score = lessonScores[i] || { correct:0, total:16, pass:false };
    totalCorrect += score.correct;
    totalQuestions += score.total;

    rows += `
      <tr>
        <td>${lesson.lesson}</td>
        <td>${lesson.title}</td>
        <td>${score.correct} / ${score.total}</td>
        <td>${Math.round(score.correct / score.total * 100)}%</td>
        <td>${score.pass ? '통과' : '미통과'}</td>
      </tr>
    `;
  });

  document.getElementById('type1Area').innerHTML = `
    <div class="card">
      <div class="stage-title">📊 유형 1 최종 결과</div>
      <table class="result-table">
        <thead>
          <tr>
            <th>단원</th>
            <th>제목</th>
            <th>점수</th>
            <th>백분율</th>
            <th>결과</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="stage-title" style="background:#27ae60;">
        전체: ${totalCorrect} / ${totalQuestions} (${Math.round(totalCorrect / totalQuestions * 100)}%)
      </div>
      <div style="text-align:center;">
        <button class="btn btn-gray" onclick="goMain()">🏠 메뉴로 가기</button>
      </div>
    </div>
  `;
  window.scrollTo(0,0);
}

function openType2Menu() {
  hideAll();
  selectedTopicIndex = null;
  type2Try = 0;

  const area = document.getElementById('type2Area');
  area.classList.remove('hidden');

  area.innerHTML = `
    <div class="card">
      <div class="stage-title">유형 2 - 긴 글쓰기 주제 선택</div>
      <p class="notice" style="text-align:center;">
        연습할 단원의 쓰기 주제를 선택하세요. 주제를 선택하면 작문 연습 화면으로 이동합니다.
      </p>
      <div class="topic-grid">
        ${writingTopics.map((topic, i) => `
          <div class="topic-card" onclick="openType2Writing(${i})">
            <strong>${topic.lesson} ${topic.title}</strong>
            <span>${topic.prompt}</span>
          </div>
        `).join('')}
      </div>
      <div style="text-align:center;margin-top:22px;">
        <button class="btn btn-gray" onclick="goMain()">← 뒤로 가기</button>
      </div>
    </div>
  `;

  window.scrollTo(0,0);
}

function openType2Writing(index) {
  selectedTopicIndex = index;
  type2Try = 0;
  const topic = writingTopics[index];

  const area = document.getElementById('type2Area');
  area.innerHTML = `
    <div class="card">
      <div class="stage-title">유형 2 - ${topic.lesson} ${topic.title}</div>
      <div class="grammar-box">
        <strong>쓰기 주제</strong><br>
        ${topic.prompt}
      </div>
      <textarea id="essay" placeholder="200~300자(띄어쓰기 포함)로 쓰세요."></textarea>
      <p id="charCount" class="notice">0자</p>
      <div style="text-align:center;">
        <button class="btn btn-gray" onclick="openType2Menu()">← 주제 선택으로</button>
        <button class="btn btn-blue" onclick="checkEssay()">↵ 제출하기</button>
        <button class="btn btn-orange" onclick="openSpellChecker()">맞춤법 검사기 열기 ↗</button>
      </div>
      <div id="essayResult"></div>
    </div>
  `;

  document.getElementById('essay').oninput = () => {
    document.getElementById('charCount').innerText =
      document.getElementById('essay').value.length + '자';
  };

  window.scrollTo(0,0);
}

function checkEssay() {
  const text = document.getElementById('essay').value;
  const len = text.length;
  const errors = [];

  if (len < 200 || len > 300) {
    errors.push(`분량: 현재 ${len}자입니다. 200~300자로 쓰세요.`);
  }

  if (/그리고 그리고|저는 저는|그래서 그래서/.test(text)) {
    errors.push('같은 접속어나 주어가 반복된 곳이 있습니다.');
  }

  if (/[.!?]{2,}|[가-힣][.][가-힣]/.test(text)) {
    errors.push('문장 부호와 문장 사이 띄어쓰기를 확인하세요.');
  }

  if (/\s{3,}/.test(text)) {
    errors.push('불필요하게 긴 공백이 있습니다.');
  }

  if (!/[.?!요다]$/.test(text.trim())) {
    errors.push('마지막 문장의 종결 표현을 확인하세요.');
  }

  const result = document.getElementById('essayResult');
  type2Try++;

  if (!errors.length) {
    result.innerHTML = `
      <div class="feedback ok" style="display:block;">
        기본 점검을 통과했습니다. 교사가 최종 내용을 확인하세요.
      </div>
    `;
    return;
  }

  let html = `
    <div class="feedback no" style="display:block;">
      <strong>수정할 부분</strong>
      <ul class="error-list">
        ${errors.map(error => `<li>${error}</li>`).join('')}
      </ul>
  `;

  if (type2Try >= 2) {
    const topic = writingTopics[selectedTopicIndex];
    html += `
      <hr>
      <strong>참고 답안 방향</strong>
      <p>
        ${topic.prompt} 주제에 맞게 먼저 상황을 소개하고,
        이유 두 가지와 자신의 생각을 200~300자로 정리하세요.
        문장은 짧게 쓰고, 한 문장에 한 가지 정보만 쓰세요.
      </p>
    `;
  }

  html += `</div>`;
  result.innerHTML = html;
}

function openSpellChecker() {
  const text = document.getElementById('essay') ? document.getElementById('essay').value : '';

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
  }

  window.open(
    'https://search.naver.com/search.naver?query=%EB%84%A4%EC%9D%B4%EB%B2%84%20%EB%A7%9E%EC%B6%A4%EB%B2%95%20%EA%B2%80%EC%82%AC%EA%B8%B0',
    '_blank'
  );
}
</script>
